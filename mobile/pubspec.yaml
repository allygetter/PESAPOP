name: pesapop_app
description: PESAPOP AI — Africa's Business Operating System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ───────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # ─── Navigation ─────────────────────────────────────────
  go_router: ^13.2.0

  # ─── HTTP & API ─────────────────────────────────────────
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  json_annotation: ^4.9.0

  # ─── Local Storage ───────────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # ─── UI & Design ────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # ─── Charts & Analytics ─────────────────────────────────
  fl_chart: ^0.67.0

  # ─── POS & Scanning ─────────────────────────────────────
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # ─── Printing & Receipts ────────────────────────────────
  pdf: ^3.11.0
  printing: ^5.14.2
  bluetooth_print_plus: ^2.4.0

  # ─── Notifications ──────────────────────────────────────
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^17.1.2

  # ─── Permissions ────────────────────────────────────────
  permission_handler: ^11.3.1

  # ─── Utils ──────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.1.1
  device_info_plus: ^11.1.0
  local_auth: ^2.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

  mockito: ^5.4.4


flutter:
  uses-material-design: true
